<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Nicecat EXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-elevated: #12121a;
            --bg-card: #16161f;
            --bg-hover: #1c1c26;
            --border: #252533;
            --text: #f0f0f5;
            --text-muted: #8a8a9a;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-20px,-20px) scale(1.05); }
        }

        .app { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-elevated);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .sidebar-logo .icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            -webkit-text-fill-color: white;
        }

        .nav-section {
            padding: 1rem 0.75rem;
            flex: 1;
            overflow-y: auto;
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            margin-top: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin: 0.15rem 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: all 0.2s;
            border: none;
            background: none;
            width: calc(100% - 1rem);
            font-family: inherit;
            text-align: left;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(124,58,237,0.08);
            color: var(--text);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(139,92,246,0.1));
            color: var(--accent-light);
            border: 1px solid rgba(124,58,237,0.3);
        }

        .nav-item.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-item.locked:hover {
            background: rgba(239,68,68,0.05);
            color: var(--text-muted);
        }

        .nav-item .nav-icon {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }

        .lock-icon {
            margin-left: auto;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-plan {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem;
            transition: color 0.2s;
        }
        .logout-btn:hover { color: var(--error); }

        /* Main */
        .main {
            flex: 1;
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 64px;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .topbar-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .btn-gold {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 4px 15px rgba(245,158,11,0.3);
        }
        .btn-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245,158,11,0.4);
        }

        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .btn-lg { padding: 0.75rem 1.5rem; font-size: 0.95rem; }
        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: var(--error);
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.2);
        }

        .content {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HOME SECTION ===== */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(139,92,246,0.08));
            border: 1px solid rgba(124,58,237,0.25);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .welcome-text h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .welcome-text p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(124,58,237,0.3);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            opacity: 0.5;
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-card .stat-value {
            font-size: 2.25rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .stat-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        .stat-card .stat-icon {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            opacity: 0.3;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
        }

        .panel-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .panel-box h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 600; }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        .q-action {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .q-action:hover {
            border-color: var(--accent);
            background: rgba(124,58,237,0.08);
        }
        .q-action .emoji { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .q-action span {
            font-size: 0.8rem;
            font-weight: 600;
            display: block;
        }
        .q-action.locked {
            opacity: 0.4;
            cursor: not-allowed;
            position: relative;
        }
        .q-action.locked:hover {
            border-color: var(--border);
            background: var(--bg-elevated);
        }
        .q-action.locked::after {
            content: '🔒';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.9rem;
        }

        .announcement-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .announcement {
            padding: 0.75rem 1rem;
            background: var(--bg-elevated);
            border-radius: 10px;
            border-left: 3px solid var(--accent);
        }
        .announcement strong {
            font-size: 0.9rem;
            display: block;
            margin-bottom: 0.25rem;
        }
        .announcement p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ===== LOCKED OVERLAY ===== */
        .locked-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 10;
            border-radius: inherit;
        }
        .locked-overlay .lock-emoji { font-size: 3rem; }
        .locked-overlay h3 { font-size: 1.25rem; font-weight: 800; }
        .locked-overlay p { color: var(--text-muted); font-size: 0.9rem; max-width: 300px; text-align: center; }

        .locked-container {
            position: relative;
        }

        /* ===== GAMES SECTION ===== */
        .games-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .games-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .search-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 1rem;
            min-width: 280px;
        }
        .search-bar input {
            background: none;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
        }
        .search-bar input::placeholder { color: var(--text-muted); }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: rgba(124,58,237,0.4);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .game-card .game-tag {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 2;
        }
        .game-tag.popular {
            background: rgba(245,158,11,0.2);
            color: var(--gold);
            border: 1px solid rgba(245,158,11,0.3);
        }
        .game-tag.new {
            background: rgba(34,197,94,0.2);
            color: var(--success);
            border: 1px solid rgba(34,197,94,0.3);
        }
        .game-thumb {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
        }
        .game-thumb::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to top, var(--bg-card), transparent);
        }
        .game-info {
            padding: 1rem;
            position: relative;
            z-index: 1;
        }
        .game-info h4 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-meta .player-count {
            font-size: 0.8rem;
            color: var(--success);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .game-meta .player-count::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--success);
            animation: pulse 2s infinite;
        }
        .game-status {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* ===== SCRIPT SECTION ===== */
        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .script-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .script-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .script-box h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .code-block {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
