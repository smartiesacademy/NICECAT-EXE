<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Nicecat EXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-elevated: #12121a;
            --bg-card: #16161f;
            --border: #252533;
            --text: #f0f0f5;
            --text-muted: #8a8a9a;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --error: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.1) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-20px,-20px) scale(1.05); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .logo-center {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        .logo-center h1 {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-center p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
        }

        .input-wrap .icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            align-items: center;
            gap: 0.4rem;
        }

        .error-msg.show { display: flex; }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-elevated);
            border-color: var(--accent);
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer-text a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover { text-decoration: underline; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--text); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <div class="logo-center">
                <div class="logo-icon">🐱</div>
                <h1>Nicecat EXE</h1>
                <p>Sign in to your dashboard</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrap">
                        <span class="icon">📧</span>
                        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="error-msg" id="emailError">⚠️ Please enter a valid email.</div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <div class="error-msg" id="passError">⚠️ Password must be at least 6 characters.</div>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Sign In</span>
                    <span id="btnArrow">→</span>
                </button>
            </form>

            <div class="divider">or</div>

            <button class="btn btn-ghost" onclick="window.location.href='nicecat_exe_pricing.html'">
                🛒 Purchase Access
            </button>

            <p class="footer-text">
                Don't have an account? <a href="nicecat_exe_pricing.html">Buy a key</a>
            </p>
            <a href="nicecat_exe_website.html" class="back-link">← Back to home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const card = document.getElementById('loginCard');
        const emailIn = document.getElementById('email');
        const passIn = document.getElementById('password');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let valid = true;

            document.getElementById('emailError').classList.remove('show');
            document.getElementById('passError').classList.remove('show');

            if (!emailIn.value.includes('@') || emailIn.value.length < 5) {
                document.getElementById('emailError').classList.add('show');
                valid = false;
            }

            if (passIn.value.length < 6) {
                document.getElementById('passError').classList.add('show');
                valid = false;
            }

            if (!valid) {
                card.classList.remove('shake');
                void card.offsetWidth;
                card.classList.add('shake');
                return;
            }

            // Simulate login
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span>Signing in...</span> ⏳';
            btn.disabled = true;

            setTimeout(() => {
                localStorage.setItem('nicecat_user', JSON.stringify({
                    email: emailIn.value,
                    loginAt: Date.now()
                }));
                window.location.href = 'Dashboard.html';
            }, 1200);
        });
    </script>
</body>
</html>
